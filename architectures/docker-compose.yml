services:
  nginx-audio:
    image: nginx:alpine
    container_name: audio-server
    ports:
      - "127.0.0.1:8030:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./A-direct-http:/var/www/audio:ro
      - ./B-hls-chunked:/var/www/hls:ro
      - ./logs:/var/log/nginx
    
    networks:
      - audio-test-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  audio-test-network:
    driver: bridge