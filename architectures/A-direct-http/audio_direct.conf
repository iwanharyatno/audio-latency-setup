server {
    listen 80;
    server_name elobright-backend.internal; # Adjust for the domain name & Cloudflare CDN
    
    # Root for health checks
    root /usr/share/nginx/html;
    
    # Audio endpoint - HTTP 206 Partial Content
    location /audio/ {
        alias /var/www/audio/;
        
        # Enable range requests (HTTP 206)
        add_header Accept-Ranges bytes always;
        
        # CORS headers for web player access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept-Encoding" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
        
        # MP3 files with proper headers
        location ~* \.mp3$ {
            add_header Accept-Ranges bytes always;
            add_header Content-Type "audio/mpeg" always;
            
            # Cache control
            expires 1h;
            add_header Cache-Control "public, max-age=3600, immutable" always;
            
            # Performance
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
        }
        
        autoindex off;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "A-direct-http healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}