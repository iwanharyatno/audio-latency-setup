server {
    listen 80;
    server_name elobright-backend.internal; # Adjust for the domain name & Cloudflare CDN
    
    # Root for health checks
    root /usr/share/nginx/html;
    
    # HLS endpoint
    location /hls/ {
        alias /var/www/hls/;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
        
        # HLS playlist files (.m3u8)
        location ~* \.m3u8$ {
            add_header Content-Type "application/vnd.apple.mpegurl" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
            add_header Access-Control-Allow-Origin "*" always;
        }
        
        # HLS segment files (.ts)
        location ~* \.ts$ {
            add_header Content-Type "video/mp2t" always;
            expires 1h;
            add_header Cache-Control "public, max-age=3600, immutable" always;
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            add_header Access-Control-Allow-Origin "*" always;
        }
        
        # MP3 source files
        location ~* \.mp3$ {
            add_header Content-Type "audio/mpeg" always;
            add_header Accept-Ranges bytes always;
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
        }
        
        autoindex off;
    }
    
    # Sample MP3 at root
    location /sample.mp3 {
        alias /var/www/hls/audio_sample.mp3;
        add_header Accept-Ranges bytes always;
        add_header Content-Type "audio/mpeg" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "B-hls-chunked healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}