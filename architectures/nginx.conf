user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Disable gzip for binary files
    gzip off;

    # Connection limiting for testing
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 100;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # Logging format
    log_format combined_audio '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'rt=$request_time uct="$upstream_connect_time" '
                              'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Server block for both audio types
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ============================================
        # ARCHITECTURE A: Direct HTTP 206 Partial Content
        # URL: http://localhost:8080/audio/part_A_1.mp3
        # ============================================
        location /audio/ {
            alias /var/www/audio/;

            # Enable range requests (HTTP 206)
            add_header Accept-Ranges bytes always;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Accept-Encoding" always;
            add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

            # Preflight handling
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            # MP3 files configuration
            location ~* \.mp3$ {
                add_header Accept-Ranges bytes always;
                add_header Content-Type "audio/mpeg" always;

                # Cache headers for CDN
                expires 1h;
                add_header Cache-Control "public, max-age=3600, immutable" always;

                # Performance
                sendfile on;
                tcp_nopush on;
                tcp_nodelay on;
            }

            autoindex off;
        }

        # ============================================
        # ARCHITECTURE B: HLS Chunked Streaming
        # URL: http://localhost:8080/hls/part_A_1.mp3/playlist.m3u8
        # ============================================
        location /hls/ {
            alias /var/www/hls/;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

            # Preflight handling
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            # HLS playlist files (.m3u8)
            location ~* \.m3u8$ {
                add_header Content-Type "application/vnd.apple.mpegurl" always;
                
                # No cache for playlists (may update)
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                expires -1;
                
                add_header Access-Control-Allow-Origin "*" always;
            }

            # HLS segment files (.ts)
            location ~* \.ts$ {
                add_header Content-Type "video/mp2t" always;
                
                # Cache segments aggressively for CDN
                expires 1h;
                add_header Cache-Control "public, max-age=3600, immutable" always;
                
                # Performance
                sendfile on;
                tcp_nopush on;
                tcp_nodelay on;
                
                add_header Access-Control-Allow-Origin "*" always;
            }

            # MP3 source files in HLS folders
            location ~* \.mp3$ {
                add_header Content-Type "audio/mpeg" always;
                add_header Accept-Ranges bytes always;
                expires 1h;
                add_header Cache-Control "public, max-age=3600" always;
                add_header Access-Control-Allow-Origin "*" always;
            }

            autoindex off;
        }

        # ============================================
        # Health check endpoint
        # ============================================
        location /health {
            access_log off;
            return 200 "nginx audio server healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # Root path info
        # ============================================
        location / {
            access_log off;
            return 200 "Audio Server Running\n\nEndpoints:\n- /audio/<file>.mp3 (Direct HTTP 206)\n- /hls/<folder>/<file>.m3u8 (HLS Playlist)\n- /hls/<folder>/<segment>.ts (HLS Segments)\n";
            add_header Content-Type text/plain;
        }

        # Logging
        access_log /var/log/nginx/access.log combined_audio;
        error_log /var/log/nginx/error.log warn;
    }
}